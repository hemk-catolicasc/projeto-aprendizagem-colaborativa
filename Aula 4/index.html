<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <style>
      body{
        min-height:100vh;
        margin:0;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7fb;
        color: #0f172a;
        padding:20px;
      }

      .container{
        width:100%;
        max-width:420px;
        background:#ffffff;
        border-radius:8px;
        padding:20px;
        box-shadow:0 6px 18px rgba(16,24,40,0.06);
        border:1px solid #e6eef8;
      }



      form{
        display:flex;
        flex-direction:column;
        gap:10px
      }

      label{
        font-size:0.9rem;
        color:#334155
      }

      input {
        width:90%;
        padding:10px 12px;
        border-radius:6px;
        border:1px solid #cbd5e1;
        font-size:1rem;
      }

      button{
        padding:10px 14px;
        border-radius:6px;
        border:none;
        background:#7c3aed;
        color:#fff;
        font-weight:600;
        cursor:pointer;
      }

      .mensagem{margin-top:12px;font-size:0.95rem;color:green}

      @media (max-width:480px){
        .container{padding:16px}
        body{padding:12px}
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <h1>Cadastro de Usuário</h1>
        <form id="formularioCadastro" action="mostrar_dados()" method="post">
          <label for="name">Nome:</label>
          <input type="text" id="name" required minlength="3"/>
          <br/><br/>

          <label for="email">Email:</label>
          <input type="email" id="email" />
          <br><br/>

          <label for="age">Idade:</label>
          <input type="number" id="age" min="0" max="120" />
          <br/><br/>

          <button type="submit">Cadastrar</button>
        </form>
      </div>

      <div class="mensagem" id="mensagem"></div>
    </main>

    <script>
      const form = document.getElementById('formularioCadastro');
      const mensagem = document.getElementById('mensagem');
 
      form.addEventListener('submit', function(event) {
      event.preventDefault();
 
      const nome = document.getElementById('name').value;
      const idade = document.getElementById('age').value;
 
      mensagem.style.color = "green";
      mensagem.innerHTML = "Cadastro realizado com sucesso!<br>Nome: " + nome + "<br>Idade: " + idade;
    });
    </script>
  </body>
</html>
